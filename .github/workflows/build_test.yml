name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A newer push supersedes the running build: minutes are free on public repos,
# but concurrency slots are not (20 jobs total, 5 for macOS on the free plan)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Every RID builds on a native runner: no cross toolchains.
        # fullTests lanes additionally run the live ffmpeg loopback tests;
        # the others run the native libsrt loopback (plain + encrypted) and
        # version tests, because no SRT-capable ffmpeg is available there
        # (Homebrew ffmpeg has no srt protocol; no reliable ffmpeg on
        # win-arm64).
        # osx-x64 is deliberately unsupported: Intel Macs ended with macOS 26
        # and shipping the RID once would turn dropping it into a breaking
        # change, while adding it later stays purely additive.
        include:
          - { os: windows-2025,     rid: win-x64,     fullTests: true }
          - { os: windows-11-arm,   rid: win-arm64,   fullTests: false }
          - { os: ubuntu-24.04,     rid: linux-x64,   fullTests: true }
          - { os: ubuntu-24.04-arm, rid: linux-arm64, fullTests: true }
          - { os: macos-15,         rid: osx-arm64,   fullTests: false }
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build libclang-dev ffmpeg
        # ninja is preinstalled on the macOS images and Homebrew ffmpeg lacks
        # the srt protocol, so the macOS lane installs nothing at all

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y

      - name: Install ffmpeg (Windows x64)
        if: matrix.rid == 'win-x64'
        run: choco install ffmpeg -y

      - name: Build native interop
        working-directory: interop
        run: cargo build --release

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build .NET
        run: dotnet build --configuration Release -p:InteropTargetDir=../interop/target/release

      - name: Show native placement
        shell: bash
        run: |
          ls -la Spangle.Net.Transport.SRT.Tests/bin/Release/net10.0/ | grep -i srt_interop
          # runtime dependencies must be system libraries only - a build-dir
          # path here means the static link silently fell through to shared
          case "$RUNNER_OS" in
            macOS) otool -L Spangle.Net.Transport.SRT.Tests/bin/Release/net10.0/libsrt_interop.dylib ;;
            Linux) ldd Spangle.Net.Transport.SRT.Tests/bin/Release/net10.0/libsrt_interop.so ;;
          esac

      - name: Test (live ffmpeg loopback)
        if: ${{ matrix.fullTests }}
        run: dotnet test --no-build --configuration Release -p:InteropTargetDir=../interop/target/release --logger "console;verbosity=detailed"

      - name: Test (native loopback, no external tools)
        if: ${{ !matrix.fullTests }}
        run: dotnet test --no-build --configuration Release -p:InteropTargetDir=../interop/target/release --filter "TestNativeLibraryVersion|TestNativeClientLoopback|TestEncryptedNativeLoopback" --logger "console;verbosity=detailed"

      - name: Collect native artifact
        shell: bash
        run: |
          dest="artifact/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$dest"
          for f in interop/target/release/srt_interop.dll \
                   interop/target/release/libsrt_interop.so \
                   interop/target/release/libsrt_interop.dylib; do
            [ -f "$f" ] && cp "$f" "$dest/"
          done
          ls -la "$dest"
          # fail loudly if nothing was produced
          [ -n "$(ls -A "$dest")" ]

      - uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.rid }}
          path: artifact/
          if-no-files-found: error
